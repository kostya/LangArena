x-shared: &shared
  tty: true
  stdin_open: true
  volumes:
    - .:/src
  working_dir: /src
  shm_size: '2gb'
  deploy:
    resources:
      limits:
        memory: 8G
        cpus: '8'
  cap_add:
    - SYS_NICE
    - SYS_ADMIN

services:
  base:
    <<: *shared
    image: benchmarks:base
    build: 
      dockerfile: docker/base

  crystal:
    <<: *shared
    image: benchmarks:crystal
    working_dir: /src/crystal
    build:
      dockerfile: docker/crystal
      args:
        version: 1.18.2
    volumes:
      - .:/src
      # Dependencies (shards) - НЕ очищаем
      - ./cache/deps/crystal/lib:/usr/local/crystal/lib  # Установленные shards
      - ./cache/deps/crystal/shards:/root/.cache/shards  # Кэш скачанных shards
      # Build cache - очищаем для cold compile
      - ./cache/build/crystal/target:/src/crystal/target
      - ./cache/build/crystal/cache:/root/.cache/crystal

  rust:
    <<: *shared
    image: benchmarks:rust
    working_dir: /src/rust
    build:
      dockerfile: docker/rust
      args:
        version: 1.92.0
    volumes:
      - .:/src
      # Dependencies cache - НЕ очищаем
      - ./cache/deps/rust/registry:/usr/local/cargo/registry  # Исправлен путь
      - ./cache/deps/rust/git:/usr/local/cargo/git  # Исправлен путь
      # Build cache - очищаем для cold compile
      - ./cache/build/rust/target:/src/rust/target
      - ./cache/build/rust/deps:/usr/local/cargo/target  # Для глобальных билдов
    environment:
      - CARGO_HOME=/usr/local/cargo
      - RUSTUP_HOME=/usr/local/rustup

  zig:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:zig
    working_dir: /src/zig
    build: 
      dockerfile: docker/zig
      args:
        # https://ziglang.org/download/
        version: 0.15.2
    volumes:
      - .:/src:delegated
    depends_on:
      - base

  base_clang:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:base_clang
    working_dir: /src
    build: 
      dockerfile: docker/base_clang
      args:
        # https://github.com/llvm/llvm-project/releases
        version: 21
    depends_on:
      - base

  clang_c:
    <<: *shared-cpu
    image: benchmarks:clang_c
    working_dir: /src/c
    build: 
      dockerfile: docker/clang_c
    depends_on:
      - base_clang

  clang_cpp:
    <<: *shared-cpu
    image: benchmarks:clang_cpp
    working_dir: /src/cpp
    build: 
      dockerfile: docker/clang_cpp
    depends_on:
      - base_clang

  dotnet:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:dotnet
    working_dir: /src/csharp
    build: 
      dockerfile: docker/dotnet
      args:
        # https://dotnet.microsoft.com/en-us/download/dotnet
        version: "10.0"
    volumes:
      - .:/src:delegated
      - ./cache/dotnet-nuget:/root/.nuget/packages          # NuGet packages
      - ./cache/dotnet:/root/.dotnet/
    depends_on:
      - base

  base_gcc:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:base_gcc
    working_dir: /src
    build: 
      dockerfile: docker/base_gcc
      args:
        # https://gcc.gnu.org/releases.html
        version: "14"
    depends_on:
      - base      

  gcc_c:
    <<: *shared-cpu
    image: benchmarks:gcc_c
    working_dir: /src/c
    build: 
      dockerfile: docker/gcc_c
    depends_on:
      - base_gcc 

  gcc_cpp:
    <<: *shared-cpu
    image: benchmarks:gcc_cpp
    working_dir: /src/cpp
    build: 
      dockerfile: docker/gcc_cpp
    depends_on:
      - base_gcc 

  gccgo:
    <<: *shared
    image: benchmarks:gccgo
    working_dir: /src/golang
    build:
      dockerfile: docker/gccgo
      args:
        version: "14"
    volumes:
      - .:/src
      - ./cache/build/gccgo/build:/tmp/go-build  # GCCGO build cache
      - ./cache/build/gccgo/target:/src/golang/target

  golang:
    <<: *shared
    image: benchmarks:golang
    working_dir: /src/golang
    build:
      dockerfile: docker/golang
      args:
        version: "1.25.5"
    volumes:
      - .:/src
      # Dependencies cache - НЕ очищаем
      - ./cache/deps/go/mod-cache:/go/pkg/mod
      - ./cache/deps/go/sumdb:/go/pkg/sumdb  # Добавил checksum DB
      # Build cache - очищаем для cold compile
      - ./cache/build/go/build-cache:/root/.cache/go-build
      - ./cache/build/go/bin-cache:/go/bin  # Скомпилированные бинарники
      - ./cache/build/go/target:/src/golang/target
    environment:
      - GOCACHE=/root/.cache/go-build
      - GOMODCACHE=/go/pkg/mod   

  swift:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:swift
    working_dir: /src/swift
    build: 
      dockerfile: docker/swift
      args:
        # https://github.com/swiftlang/swift/releases
        version: "6.2.3"
    volumes:
      - .:/src:delegated
      - ./cache/swift-build:/root/.cache/swift         # Основной кеш сборки
      - ./cache/swift-packages:/root/.swiftpm          # Кеш пакетов        
    depends_on:
      - base   

  nodejs:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:nodejs
    build: 
      dockerfile: docker/nodejs
      args:
        # https://nodejs.org/en/about/previous-releases
        version: "25.x"
    depends_on:
      - base   

  java:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:java
    working_dir: /src/java
    build: 
      dockerfile: docker/java
      args:
        # https://www.java.com/releases/
        version: "25"
        mavenversion: 3.9.12
    volumes:
      - .:/src:delegated
      - ./cache/maven:/root/.m2          # Maven repository cache
    depends_on:
      - base   

  kotlin:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:kotlin
    working_dir: /src/kotlin
    build: 
      dockerfile: docker/kotlin
      args:
        # https://kotlinlang.org/docs/releases.html        
        version: "2.3.0"
        # https://gradle.org/releases/
        gradleversion: 9.2.1
    volumes:
      - .:/src:delegated
      - ./cache/kotlin-gradle:/root/.gradle/
      - ./cache/kotlin:/root/.kotlin
      - ./cache/kotlin-maven:/root/.m2
    depends_on:
      - java

  graalvm:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:graalvm
    working_dir: /src/java
    build: 
      dockerfile: docker/graalvm
      args:
        # https://www.graalvm.org/release-notes/
        version: "25.0.1"
        mavenversion: 3.9.12
    volumes:
      - .:/src:delegated
      - ./cache/maven-graalvm:/root/.m2
      # - ./cache/java-target:/src/java/target        
    depends_on:
      - base

  kotlin-graalvm:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:kotlin-graalvm
    working_dir: /src/kotlin
    build: 
      dockerfile: docker/kotlin-graalvm
      args:
        # https://kotlinlang.org/docs/releases.html
        version: "2.3.0"
        # https://gradle.org/releases/
        gradleversion: 9.2.1
    volumes:
      - .:/src:delegated
      - ./cache/kotlin-graalvm-gradle:/root/.gradle
      - ./cache/kotlin-graalvm:/root/.kotlin
      - ./cache/kotlin-graalvm-cache:/root/.cache/graalvm
      - ./cache/kotlin-maven-graalvm:/root/.m2
      - ./cache/kotlin-graalvm-javac:/root/.cache/javac            # Java компиляция
    depends_on:
      - graalvm

  typescript:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:typescript
    working_dir: /src/typescript
    build: 
      dockerfile: docker/typescript
      args:
        # https://www.npmjs.com/package/typescript
        version: "5.9.3"
    volumes:
      - .:/src:delegated
      - ./cache/npm-typescript:/root/.npm
      - ./cache/typescript-node-modules:/src/typescript/node_modules
      - ./cache/typescript-dist:/src/typescript/dist        
    depends_on:
      - nodejs

  typescript-deno:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:typescript-deno
    working_dir: /src/typescript
    build: 
      dockerfile: docker/typescript-deno
    volumes:
      - .:/src:delegated
      - ./cache/deno:/root/.cache/deno
      - ./cache/typescript-node-modules-bun:/src/typescript/node_modules
      # - ./cache/typescript-dist-bun:/src/typescript/dist-bun      
    depends_on:
      - base

  typescript-bun:
    <<: *shared-cpu  # Максимальная оптимизация CPU
    image: benchmarks:typescript-bun
    working_dir: /src/typescript
    build: 
      dockerfile: docker/typescript-bun
      args:
        # https://bun.com/
        version: "1.3.6"
    volumes:
      - .:/src:delegated
      - ./cache/deno-typescript:/root/.cache/deno
      - ./cache/typescript-deno-dist:/src/typescript/dist-deno        
    depends_on:
      - base
